name: "Skills Check CI"
description: "The missing quality toolkit for Agent Skills — freshness, security, linting, and more"
author: "voodootikigod"

branding:
  icon: "shield"
  color: "green"

inputs:
  # ── Command selection ──────────────────────────────────────────────
  commands:
    description: "Comma-separated list of commands to run (e.g. 'check,audit,lint'). Overrides individual command flags when set."
    default: ""

  # ── Individual command toggles (opt-in, ignored when 'commands' is set) ──
  check:
    description: "Run the check command (version drift detection)"
    default: "true"
  audit:
    description: "Run the audit command (security & hallucination detection)"
    default: "false"
  lint:
    description: "Run the lint command (metadata validation)"
    default: "false"
  budget:
    description: "Run the budget command (token cost analysis)"
    default: "false"
  policy:
    description: "Run the policy check command (organizational rule enforcement)"
    default: "false"
  verify:
    description: "Run the verify command (semver bump validation)"
    default: "false"
  test:
    description: "Run the test command (eval test suites)"
    default: "false"
  fingerprint:
    description: "Run the fingerprint command (generate skill fingerprint registry)"
    default: "false"
  usage:
    description: "Run the usage command (analyze skill usage from telemetry)"
    default: "false"

  # ── Command-specific thresholds ────────────────────────────────────
  audit-fail-on:
    description: "Audit severity threshold: critical, high, medium, low"
    default: "high"
  lint-fail-on:
    description: "Lint level threshold: error, warning"
    default: "error"
  budget-max-tokens:
    description: "Budget token ceiling — fail if total exceeds this value"
    default: ""
  policy-file:
    description: "Path to .skill-policy.yml for the policy command"
    default: ""
  policy-fail-on:
    description: "Policy severity threshold: blocked, violation, warning"
    default: "blocked"
  usage-store:
    description: "Telemetry store URI for the usage command (e.g. file://telemetry.jsonl or sqlite://telemetry.db)"
    default: ""
  usage-check-policy:
    description: "Cross-reference usage data against skill policy"
    default: "false"

  # ── Shared options ─────────────────────────────────────────────────
  skills-dir:
    description: "Directory containing skill files to analyze"
    default: "."
  registry:
    description: "Path to the skills-check.json registry file"
    default: "skills-check.json"
  node-version:
    description: "Node.js version to use"
    default: "22"

  # ── Check-specific options (backward-compatible) ───────────────────
  open-issues:
    description: "Open or update a GitHub issue when staleness is detected"
    default: "true"
  issue-label:
    description: "Label used for issue deduplication"
    default: "skill-staleness"
  fail-on-stale:
    description: "Exit with non-zero code when stale products are found"
    default: "false"
  token:
    description: "GitHub token (needs issues: write permission)"
    default: ${{ github.token }}

outputs:
  stale-count:
    description: "Number of stale products (0 if all current)"
    value: ${{ steps.check.outputs.stale_count }}
  issue-number:
    description: "Issue number created or updated (empty if none)"
    value: ${{ steps.upsert.outputs.issue_number }}
  report:
    description: "Full markdown report from the check command"
    value: ${{ steps.report.outputs.report }}
  results:
    description: "JSON object with exit codes from each command that was run"
    value: ${{ steps.summary.outputs.results }}
  # ── Per-command structured outputs ────────────────────────────────
  audit-findings:
    description: "Total number of audit findings"
    value: ${{ steps.audit.outputs.finding_count }}
  lint-findings:
    description: "Total number of lint findings"
    value: ${{ steps.lint.outputs.finding_count }}
  budget-total-tokens:
    description: "Total token count across all skills"
    value: ${{ steps.budget.outputs.total_tokens }}
  policy-findings:
    description: "Total number of policy findings"
    value: ${{ steps.policy.outputs.finding_count }}
  verify-failed:
    description: "Number of verify mismatches"
    value: ${{ steps.verify.outputs.failed_count }}
  test-failed:
    description: "Number of failed test cases"
    value: ${{ steps.test.outputs.failed_count }}
  fingerprint-skills:
    description: "Number of skills fingerprinted"
    value: ${{ steps.fingerprint.outputs.skill_count }}
  usage-calls:
    description: "Total number of skill usage calls"
    value: ${{ steps.usage.outputs.total_calls }}

runs:
  using: "composite"
  # NOTE: skills-check is pinned to a specific version (currently 1.3.0) to prevent
  # supply chain attacks. Update the pinned version in all npx commands when releasing.
  steps:
    # ── Setup ──────────────────────────────────────────────────────────
    - name: Setup Node.js
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
      with:
        node-version: ${{ inputs.node-version }}

    # ── Resolve which commands to run ──────────────────────────────────
    - name: Resolve commands
      id: resolve
      shell: bash
      env:
        INPUT_COMMANDS: ${{ inputs.commands }}
        INPUT_CHECK: ${{ inputs.check }}
        INPUT_AUDIT: ${{ inputs.audit }}
        INPUT_LINT: ${{ inputs.lint }}
        INPUT_BUDGET: ${{ inputs.budget }}
        INPUT_POLICY: ${{ inputs.policy }}
        INPUT_VERIFY: ${{ inputs.verify }}
        INPUT_TEST: ${{ inputs.test }}
        INPUT_FINGERPRINT: ${{ inputs.fingerprint }}
        INPUT_USAGE: ${{ inputs.usage }}
      run: |
        if [ -n "$INPUT_COMMANDS" ]; then
          # Parse comma-separated list into individual flags
          ALLOWED="check audit lint budget policy verify test fingerprint usage"
          for CMD in $(echo "$INPUT_COMMANDS" | tr ',' ' '); do
            CMD=$(echo "$CMD" | xargs)  # trim whitespace
            if ! echo "$ALLOWED" | grep -qw "$CMD"; then
              echo "::error::Invalid command: $CMD. Allowed: $ALLOWED"
              exit 2
            fi
            echo "run_${CMD}=true" >> "$GITHUB_OUTPUT"
          done
        else
          # Use individual toggle inputs
          [ "$INPUT_CHECK" = "true" ]       && echo "run_check=true"       >> "$GITHUB_OUTPUT"
          [ "$INPUT_AUDIT" = "true" ]       && echo "run_audit=true"       >> "$GITHUB_OUTPUT"
          [ "$INPUT_LINT" = "true" ]        && echo "run_lint=true"        >> "$GITHUB_OUTPUT"
          [ "$INPUT_BUDGET" = "true" ]      && echo "run_budget=true"      >> "$GITHUB_OUTPUT"
          [ "$INPUT_POLICY" = "true" ]      && echo "run_policy=true"      >> "$GITHUB_OUTPUT"
          [ "$INPUT_VERIFY" = "true" ]      && echo "run_verify=true"      >> "$GITHUB_OUTPUT"
          [ "$INPUT_TEST" = "true" ]        && echo "run_test=true"        >> "$GITHUB_OUTPUT"
          [ "$INPUT_FINGERPRINT" = "true" ] && echo "run_fingerprint=true" >> "$GITHUB_OUTPUT"
          [ "$INPUT_USAGE" = "true" ]       && echo "run_usage=true"       >> "$GITHUB_OUTPUT"
        fi

    # ── Check ──────────────────────────────────────────────────────────
    - name: Check skill freshness
      id: check
      if: steps.resolve.outputs.run_check == 'true'
      shell: bash
      env:
        INPUT_REGISTRY: ${{ inputs.registry }}
      run: |
        set +e
        OUTPUT=$(npx --yes skills-check@1.3.0 check --registry "$INPUT_REGISTRY" --json --ci 2>&1)
        EXIT_CODE=$?
        set -e

        if [ "$EXIT_CODE" -eq 2 ]; then
          echo "::error::skills-check check: configuration error"
          echo "$OUTPUT"
          echo "exit_code=2" >> "$GITHUB_OUTPUT"
          exit 2
        fi

        # Count stale products from JSON output
        STALE_COUNT=0
        if [ "$EXIT_CODE" -eq 1 ]; then
          STALE_COUNT=$(echo "$OUTPUT" | jq '[.[] | select(.stale == true)] | length' 2>/dev/null || echo "1")
        fi

        echo "stale_count=${STALE_COUNT}" >> "$GITHUB_OUTPUT"
        echo "exit_code=${EXIT_CODE}" >> "$GITHUB_OUTPUT"

    - name: Generate report
      id: report
      if: steps.resolve.outputs.run_check == 'true' && steps.check.outputs.exit_code == '1'
      shell: bash
      env:
        INPUT_REGISTRY: ${{ inputs.registry }}
      run: |
        REPORT=$(npx --yes skills-check@1.3.0 report --registry "$INPUT_REGISTRY" --format markdown 2>/dev/null)

        # Write multiline output
        {
          echo "report<<SKILLSCHECK_EOF"
          echo "$REPORT"
          echo "SKILLSCHECK_EOF"
        } >> "$GITHUB_OUTPUT"

    - name: Upsert issue
      id: upsert
      if: steps.resolve.outputs.run_check == 'true' && steps.check.outputs.exit_code == '1' && inputs.open-issues == 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
        ISSUE_LABEL: ${{ inputs.issue-label }}
        REPORT_BODY: ${{ steps.report.outputs.report }}
      run: bash "${GITHUB_ACTION_PATH}/.github/scripts/upsert-issue.sh"

    - name: Fail on stale
      if: steps.resolve.outputs.run_check == 'true' && steps.check.outputs.exit_code == '1' && inputs.fail-on-stale == 'true'
      shell: bash
      env:
        STALE_COUNT: ${{ steps.check.outputs.stale_count }}
      run: |
        echo "::error::${STALE_COUNT} stale product(s) detected"
        exit 1

    # ── Audit ──────────────────────────────────────────────────────────
    - name: Audit skill security
      id: audit
      if: steps.resolve.outputs.run_audit == 'true'
      shell: bash
      env:
        INPUT_SKILLS_DIR: ${{ inputs.skills-dir }}
        INPUT_AUDIT_FAIL_ON: ${{ inputs.audit-fail-on }}
      run: |
        set +e
        AUDIT_OUTPUT=$(npx --yes skills-check@1.3.0 audit "$INPUT_SKILLS_DIR" \
          --format json \
          --fail-on "$INPUT_AUDIT_FAIL_ON" 2>&1)
        EXIT_CODE=$?
        set -e

        echo "exit_code=${EXIT_CODE}" >> "$GITHUB_OUTPUT"

        # Extract finding count from JSON output
        FINDING_COUNT=$(echo "$AUDIT_OUTPUT" | jq '.summary.total // 0' 2>/dev/null || echo "0")
        echo "finding_count=${FINDING_COUNT}" >> "$GITHUB_OUTPUT"

        if [ "$EXIT_CODE" -eq 2 ]; then
          echo "::error::skills-check audit: configuration error"
          exit 2
        fi
        if [ "$EXIT_CODE" -eq 1 ]; then
          echo "::error::skills-check audit: findings at or above '${INPUT_AUDIT_FAIL_ON}' severity"
          exit 1
        fi

    # ── Lint ───────────────────────────────────────────────────────────
    - name: Lint skill metadata
      id: lint
      if: steps.resolve.outputs.run_lint == 'true'
      shell: bash
      env:
        INPUT_SKILLS_DIR: ${{ inputs.skills-dir }}
        INPUT_LINT_FAIL_ON: ${{ inputs.lint-fail-on }}
      run: |
        set +e
        LINT_OUTPUT=$(npx --yes skills-check@1.3.0 lint "$INPUT_SKILLS_DIR" \
          --ci \
          --format json \
          --fail-on "$INPUT_LINT_FAIL_ON" 2>&1)
        EXIT_CODE=$?
        set -e

        echo "exit_code=${EXIT_CODE}" >> "$GITHUB_OUTPUT"

        # Extract finding count from JSON output
        FINDING_COUNT=$(echo "$LINT_OUTPUT" | jq '.findings | length // 0' 2>/dev/null || echo "0")
        echo "finding_count=${FINDING_COUNT}" >> "$GITHUB_OUTPUT"

        if [ "$EXIT_CODE" -eq 2 ]; then
          echo "::error::skills-check lint: configuration error"
          exit 2
        fi
        if [ "$EXIT_CODE" -eq 1 ]; then
          echo "::error::skills-check lint: issues at or above '${INPUT_LINT_FAIL_ON}' level"
          exit 1
        fi

    # ── Budget ─────────────────────────────────────────────────────────
    - name: Analyze skill token budget
      id: budget
      if: steps.resolve.outputs.run_budget == 'true'
      shell: bash
      env:
        INPUT_SKILLS_DIR: ${{ inputs.skills-dir }}
        INPUT_BUDGET_MAX_TOKENS: ${{ inputs.budget-max-tokens }}
      run: |
        BUDGET_ARGS=("$INPUT_SKILLS_DIR" --format json)
        if [ -n "$INPUT_BUDGET_MAX_TOKENS" ]; then
          BUDGET_ARGS+=(--max-tokens "$INPUT_BUDGET_MAX_TOKENS")
        fi

        set +e
        BUDGET_OUTPUT=$(npx --yes skills-check@1.3.0 budget "${BUDGET_ARGS[@]}" 2>&1)
        EXIT_CODE=$?
        set -e

        echo "exit_code=${EXIT_CODE}" >> "$GITHUB_OUTPUT"

        # Extract total tokens from JSON output
        TOTAL_TOKENS=$(echo "$BUDGET_OUTPUT" | jq '.totalTokens // 0' 2>/dev/null || echo "0")
        echo "total_tokens=${TOTAL_TOKENS}" >> "$GITHUB_OUTPUT"

        if [ "$EXIT_CODE" -eq 2 ]; then
          echo "::error::skills-check budget: configuration error"
          exit 2
        fi
        if [ "$EXIT_CODE" -eq 1 ]; then
          echo "::error::skills-check budget: token count exceeds threshold (${INPUT_BUDGET_MAX_TOKENS})"
          exit 1
        fi

    # ── Policy ─────────────────────────────────────────────────────────
    - name: Enforce skill policy
      id: policy
      if: steps.resolve.outputs.run_policy == 'true'
      shell: bash
      env:
        INPUT_SKILLS_DIR: ${{ inputs.skills-dir }}
        INPUT_POLICY_FILE: ${{ inputs.policy-file }}
        INPUT_POLICY_FAIL_ON: ${{ inputs.policy-fail-on }}
      run: |
        POLICY_ARGS=("$INPUT_SKILLS_DIR" --ci --format json)
        if [ -n "$INPUT_POLICY_FILE" ]; then
          POLICY_ARGS+=(--policy "$INPUT_POLICY_FILE")
        fi
        POLICY_ARGS+=(--fail-on "$INPUT_POLICY_FAIL_ON")

        set +e
        POLICY_OUTPUT=$(npx --yes skills-check@1.3.0 policy check "${POLICY_ARGS[@]}" 2>&1)
        EXIT_CODE=$?
        set -e

        echo "exit_code=${EXIT_CODE}" >> "$GITHUB_OUTPUT"

        # Extract finding count from JSON output
        FINDING_COUNT=$(echo "$POLICY_OUTPUT" | jq '.findings | length // 0' 2>/dev/null || echo "0")
        echo "finding_count=${FINDING_COUNT}" >> "$GITHUB_OUTPUT"

        if [ "$EXIT_CODE" -eq 2 ]; then
          echo "::error::skills-check policy: configuration error"
          exit 2
        fi
        if [ "$EXIT_CODE" -eq 1 ]; then
          echo "::error::skills-check policy: violations at or above '${INPUT_POLICY_FAIL_ON}' severity"
          exit 1
        fi

    # ── Verify ─────────────────────────────────────────────────────────
    - name: Verify skill version bumps
      id: verify
      if: steps.resolve.outputs.run_verify == 'true'
      shell: bash
      run: |
        set +e
        VERIFY_OUTPUT=$(npx --yes skills-check@1.3.0 verify --all --format json --skip-llm 2>&1)
        EXIT_CODE=$?
        set -e

        echo "exit_code=${EXIT_CODE}" >> "$GITHUB_OUTPUT"

        # Extract failed count from JSON output
        FAILED_COUNT=$(echo "$VERIFY_OUTPUT" | jq '.summary.failed // 0' 2>/dev/null || echo "0")
        echo "failed_count=${FAILED_COUNT}" >> "$GITHUB_OUTPUT"

        if [ "$EXIT_CODE" -eq 2 ]; then
          echo "::error::skills-check verify: configuration error"
          exit 2
        fi
        if [ "$EXIT_CODE" -eq 1 ]; then
          echo "::error::skills-check verify: version bump mismatches detected"
          exit 1
        fi

    # ── Test ───────────────────────────────────────────────────────────
    - name: Run skill test suites
      id: test
      if: steps.resolve.outputs.run_test == 'true'
      shell: bash
      env:
        INPUT_SKILLS_DIR: ${{ inputs.skills-dir }}
      run: |
        set +e
        TEST_OUTPUT=$(npx --yes skills-check@1.3.0 test "$INPUT_SKILLS_DIR" --ci --format json 2>&1)
        EXIT_CODE=$?
        set -e

        echo "exit_code=${EXIT_CODE}" >> "$GITHUB_OUTPUT"

        # Extract failed count from JSON output (sum of failed across all suites)
        FAILED_COUNT=$(echo "$TEST_OUTPUT" | jq '[.[].failed] | add // 0' 2>/dev/null || echo "0")
        echo "failed_count=${FAILED_COUNT}" >> "$GITHUB_OUTPUT"

        if [ "$EXIT_CODE" -eq 2 ]; then
          echo "::error::skills-check test: configuration error"
          exit 2
        fi
        if [ "$EXIT_CODE" -eq 1 ]; then
          echo "::error::skills-check test: regressions detected"
          exit 1
        fi

    # ── Fingerprint ───────────────────────────────────────────────────
    - name: Generate skill fingerprints
      id: fingerprint
      if: steps.resolve.outputs.run_fingerprint == 'true'
      shell: bash
      env:
        INPUT_SKILLS_DIR: ${{ inputs.skills-dir }}
      run: |
        set +e
        FP_OUTPUT=$(npx --yes skills-check@1.3.0 fingerprint "$INPUT_SKILLS_DIR" --json 2>&1)
        EXIT_CODE=$?
        set -e

        echo "exit_code=${EXIT_CODE}" >> "$GITHUB_OUTPUT"

        # Extract skill count from JSON output
        SKILL_COUNT=$(echo "$FP_OUTPUT" | jq '.skills | length // 0' 2>/dev/null || echo "0")
        echo "skill_count=${SKILL_COUNT}" >> "$GITHUB_OUTPUT"

        if [ "$EXIT_CODE" -eq 2 ]; then
          echo "::error::skills-check fingerprint: configuration error"
          exit 2
        fi

    # ── Usage ─────────────────────────────────────────────────────────
    - name: Analyze skill usage
      id: usage
      if: steps.resolve.outputs.run_usage == 'true'
      shell: bash
      env:
        INPUT_USAGE_STORE: ${{ inputs.usage-store }}
        INPUT_USAGE_CHECK_POLICY: ${{ inputs.usage-check-policy }}
        INPUT_POLICY_FILE: ${{ inputs.policy-file }}
      run: |
        USAGE_ARGS=(--format json)
        if [ -n "$INPUT_USAGE_STORE" ]; then
          USAGE_ARGS+=(--store "$INPUT_USAGE_STORE")
        fi
        if [ "$INPUT_USAGE_CHECK_POLICY" = "true" ]; then
          USAGE_ARGS+=(--check-policy)
          if [ -n "$INPUT_POLICY_FILE" ]; then
            USAGE_ARGS+=(--policy "$INPUT_POLICY_FILE")
          fi
        fi

        set +e
        USAGE_OUTPUT=$(npx --yes skills-check@1.3.0 usage "${USAGE_ARGS[@]}" 2>&1)
        EXIT_CODE=$?
        set -e

        echo "exit_code=${EXIT_CODE}" >> "$GITHUB_OUTPUT"

        # Extract total calls from JSON output
        TOTAL_CALLS=$(echo "$USAGE_OUTPUT" | jq '.report.totalCalls // .totalCalls // 0' 2>/dev/null || echo "0")
        echo "total_calls=${TOTAL_CALLS}" >> "$GITHUB_OUTPUT"

        if [ "$EXIT_CODE" -eq 2 ]; then
          echo "::error::skills-check usage: configuration error"
          exit 2
        fi
        if [ "$EXIT_CODE" -eq 1 ]; then
          echo "::error::skills-check usage: policy violations detected"
          exit 1
        fi

    # ── Summary ────────────────────────────────────────────────────────
    - name: Collect results
      id: summary
      if: always()
      shell: bash
      env:
        CODE_CHECK: ${{ steps.check.outputs.exit_code }}
        CODE_AUDIT: ${{ steps.audit.outputs.exit_code }}
        CODE_LINT: ${{ steps.lint.outputs.exit_code }}
        CODE_BUDGET: ${{ steps.budget.outputs.exit_code }}
        CODE_POLICY: ${{ steps.policy.outputs.exit_code }}
        CODE_VERIFY: ${{ steps.verify.outputs.exit_code }}
        CODE_TEST: ${{ steps.test.outputs.exit_code }}
        CODE_FINGERPRINT: ${{ steps.fingerprint.outputs.exit_code }}
        CODE_USAGE: ${{ steps.usage.outputs.exit_code }}
      run: |
        # Build a JSON object of exit codes for each command that ran
        RESULTS="{"
        FIRST=true

        for CMD in check audit lint budget policy verify test fingerprint usage; do
          # Read exit code from the corresponding env var
          VAR="CODE_$(echo "$CMD" | tr '[:lower:]' '[:upper:]')"
          CODE="${!VAR}"

          if [ -n "$CODE" ]; then
            if [ "$FIRST" = true ]; then
              FIRST=false
            else
              RESULTS="${RESULTS},"
            fi
            RESULTS="${RESULTS}\"${CMD}\":${CODE}"
          fi
        done

        RESULTS="${RESULTS}}"
        echo "results=${RESULTS}" >> "$GITHUB_OUTPUT"
