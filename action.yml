name: "Skills Check CI"
description: "Quality & integrity layer for Agent Skills — check freshness, audit security, lint metadata, analyze budgets, enforce policy, and more"
author: "voodootikigod"

branding:
  icon: "shield"
  color: "yellow"

inputs:
  # ── Command selection ──────────────────────────────────────────────
  commands:
    description: "Comma-separated list of commands to run (e.g. 'check,audit,lint'). Overrides individual command flags when set."
    default: ""

  # ── Individual command toggles (opt-in, ignored when 'commands' is set) ──
  check:
    description: "Run the check command (version drift detection)"
    default: "true"
  audit:
    description: "Run the audit command (security & hallucination detection)"
    default: "false"
  lint:
    description: "Run the lint command (metadata validation)"
    default: "false"
  budget:
    description: "Run the budget command (token cost analysis)"
    default: "false"
  policy:
    description: "Run the policy check command (organizational rule enforcement)"
    default: "false"
  verify:
    description: "Run the verify command (semver bump validation)"
    default: "false"
  test:
    description: "Run the test command (eval test suites)"
    default: "false"

  # ── Command-specific thresholds ────────────────────────────────────
  audit-fail-on:
    description: "Audit severity threshold: critical, high, medium, low"
    default: "high"
  lint-fail-on:
    description: "Lint level threshold: error, warning"
    default: "error"
  budget-max-tokens:
    description: "Budget token ceiling — fail if total exceeds this value"
    default: ""
  policy-file:
    description: "Path to .skill-policy.yml for the policy command"
    default: ""
  policy-fail-on:
    description: "Policy severity threshold: blocked, violation, warning"
    default: "blocked"

  # ── Shared options ─────────────────────────────────────────────────
  skills-dir:
    description: "Directory containing skill files to analyze"
    default: "."
  registry:
    description: "Path to the skills-check.json registry file"
    default: "skills-check.json"
  node-version:
    description: "Node.js version to use"
    default: "22"

  # ── Check-specific options (backward-compatible) ───────────────────
  open-issues:
    description: "Open or update a GitHub issue when staleness is detected"
    default: "true"
  issue-label:
    description: "Label used for issue deduplication"
    default: "skill-staleness"
  fail-on-stale:
    description: "Exit with non-zero code when stale products are found"
    default: "false"
  token:
    description: "GitHub token (needs issues: write permission)"
    default: ${{ github.token }}

outputs:
  stale-count:
    description: "Number of stale products (0 if all current)"
    value: ${{ steps.check.outputs.stale_count }}
  issue-number:
    description: "Issue number created or updated (empty if none)"
    value: ${{ steps.upsert.outputs.issue_number }}
  report:
    description: "Full markdown report from the check command"
    value: ${{ steps.report.outputs.report }}
  results:
    description: "JSON object with exit codes from each command that was run"
    value: ${{ steps.summary.outputs.results }}

runs:
  using: "composite"
  steps:
    # ── Setup ──────────────────────────────────────────────────────────
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}

    # ── Resolve which commands to run ──────────────────────────────────
    - name: Resolve commands
      id: resolve
      shell: bash
      run: |
        COMMANDS="${{ inputs.commands }}"
        if [ -n "$COMMANDS" ]; then
          # Parse comma-separated list into individual flags
          for CMD in $(echo "$COMMANDS" | tr ',' ' '); do
            CMD=$(echo "$CMD" | xargs)  # trim whitespace
            echo "run_${CMD}=true" >> "$GITHUB_OUTPUT"
          done
        else
          # Use individual toggle inputs
          [ "${{ inputs.check }}" = "true" ]  && echo "run_check=true"  >> "$GITHUB_OUTPUT"
          [ "${{ inputs.audit }}" = "true" ]  && echo "run_audit=true"  >> "$GITHUB_OUTPUT"
          [ "${{ inputs.lint }}" = "true" ]   && echo "run_lint=true"   >> "$GITHUB_OUTPUT"
          [ "${{ inputs.budget }}" = "true" ] && echo "run_budget=true" >> "$GITHUB_OUTPUT"
          [ "${{ inputs.policy }}" = "true" ] && echo "run_policy=true" >> "$GITHUB_OUTPUT"
          [ "${{ inputs.verify }}" = "true" ] && echo "run_verify=true" >> "$GITHUB_OUTPUT"
          [ "${{ inputs.test }}" = "true" ]   && echo "run_test=true"   >> "$GITHUB_OUTPUT"
        fi

    # ── Check ──────────────────────────────────────────────────────────
    - name: Check skill freshness
      id: check
      if: steps.resolve.outputs.run_check == 'true'
      shell: bash
      run: |
        set +e
        OUTPUT=$(npx --yes skills-check check --registry "${{ inputs.registry }}" --json --ci 2>&1)
        EXIT_CODE=$?
        set -e

        if [ "$EXIT_CODE" -eq 2 ]; then
          echo "::error::skills-check check: configuration error"
          echo "$OUTPUT"
          echo "exit_code=2" >> "$GITHUB_OUTPUT"
          exit 2
        fi

        # Count stale products from JSON output
        STALE_COUNT=0
        if [ "$EXIT_CODE" -eq 1 ]; then
          STALE_COUNT=$(echo "$OUTPUT" | jq '[.[] | select(.stale == true)] | length' 2>/dev/null || echo "1")
        fi

        echo "stale_count=${STALE_COUNT}" >> "$GITHUB_OUTPUT"
        echo "exit_code=${EXIT_CODE}" >> "$GITHUB_OUTPUT"

    - name: Generate report
      id: report
      if: steps.resolve.outputs.run_check == 'true' && steps.check.outputs.exit_code == '1'
      shell: bash
      run: |
        REPORT=$(npx --yes skills-check report --registry "${{ inputs.registry }}" --format markdown 2>/dev/null)

        # Write multiline output
        {
          echo "report<<SKILLSCHECK_EOF"
          echo "$REPORT"
          echo "SKILLSCHECK_EOF"
        } >> "$GITHUB_OUTPUT"

    - name: Upsert issue
      id: upsert
      if: steps.resolve.outputs.run_check == 'true' && steps.check.outputs.exit_code == '1' && inputs.open-issues == 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
        ISSUE_LABEL: ${{ inputs.issue-label }}
        REPORT_BODY: ${{ steps.report.outputs.report }}
      run: bash "${GITHUB_ACTION_PATH}/.github/scripts/upsert-issue.sh"

    - name: Fail on stale
      if: steps.resolve.outputs.run_check == 'true' && steps.check.outputs.exit_code == '1' && inputs.fail-on-stale == 'true'
      shell: bash
      run: |
        echo "::error::${{ steps.check.outputs.stale_count }} stale product(s) detected"
        exit 1

    # ── Audit ──────────────────────────────────────────────────────────
    - name: Audit skill security
      id: audit
      if: steps.resolve.outputs.run_audit == 'true'
      shell: bash
      run: |
        set +e
        npx --yes skills-check audit "${{ inputs.skills-dir }}" \
          --format json \
          --fail-on "${{ inputs.audit-fail-on }}" \
          --quiet
        EXIT_CODE=$?
        set -e

        echo "exit_code=${EXIT_CODE}" >> "$GITHUB_OUTPUT"

        if [ "$EXIT_CODE" -eq 2 ]; then
          echo "::error::skills-check audit: configuration error"
          exit 2
        fi
        if [ "$EXIT_CODE" -eq 1 ]; then
          echo "::error::skills-check audit: findings at or above '${{ inputs.audit-fail-on }}' severity"
          exit 1
        fi

    # ── Lint ───────────────────────────────────────────────────────────
    - name: Lint skill metadata
      id: lint
      if: steps.resolve.outputs.run_lint == 'true'
      shell: bash
      run: |
        set +e
        npx --yes skills-check lint "${{ inputs.skills-dir }}" \
          --ci \
          --format json \
          --fail-on "${{ inputs.lint-fail-on }}"
        EXIT_CODE=$?
        set -e

        echo "exit_code=${EXIT_CODE}" >> "$GITHUB_OUTPUT"

        if [ "$EXIT_CODE" -eq 2 ]; then
          echo "::error::skills-check lint: configuration error"
          exit 2
        fi
        if [ "$EXIT_CODE" -eq 1 ]; then
          echo "::error::skills-check lint: issues at or above '${{ inputs.lint-fail-on }}' level"
          exit 1
        fi

    # ── Budget ─────────────────────────────────────────────────────────
    - name: Analyze skill token budget
      id: budget
      if: steps.resolve.outputs.run_budget == 'true'
      shell: bash
      run: |
        BUDGET_ARGS=("${{ inputs.skills-dir }}" --format json)
        if [ -n "${{ inputs.budget-max-tokens }}" ]; then
          BUDGET_ARGS+=(--max-tokens "${{ inputs.budget-max-tokens }}")
        fi

        set +e
        npx --yes skills-check budget "${BUDGET_ARGS[@]}"
        EXIT_CODE=$?
        set -e

        echo "exit_code=${EXIT_CODE}" >> "$GITHUB_OUTPUT"

        if [ "$EXIT_CODE" -eq 2 ]; then
          echo "::error::skills-check budget: configuration error"
          exit 2
        fi
        if [ "$EXIT_CODE" -eq 1 ]; then
          echo "::error::skills-check budget: token count exceeds threshold (${{ inputs.budget-max-tokens }})"
          exit 1
        fi

    # ── Policy ─────────────────────────────────────────────────────────
    - name: Enforce skill policy
      id: policy
      if: steps.resolve.outputs.run_policy == 'true'
      shell: bash
      run: |
        POLICY_ARGS=("${{ inputs.skills-dir }}" --ci --format json)
        if [ -n "${{ inputs.policy-file }}" ]; then
          POLICY_ARGS+=(--policy "${{ inputs.policy-file }}")
        fi
        POLICY_ARGS+=(--fail-on "${{ inputs.policy-fail-on }}")

        set +e
        npx --yes skills-check policy check "${POLICY_ARGS[@]}"
        EXIT_CODE=$?
        set -e

        echo "exit_code=${EXIT_CODE}" >> "$GITHUB_OUTPUT"

        if [ "$EXIT_CODE" -eq 2 ]; then
          echo "::error::skills-check policy: configuration error"
          exit 2
        fi
        if [ "$EXIT_CODE" -eq 1 ]; then
          echo "::error::skills-check policy: violations at or above '${{ inputs.policy-fail-on }}' severity"
          exit 1
        fi

    # ── Verify ─────────────────────────────────────────────────────────
    - name: Verify skill version bumps
      id: verify
      if: steps.resolve.outputs.run_verify == 'true'
      shell: bash
      run: |
        set +e
        npx --yes skills-check verify --all --format json --skip-llm --quiet
        EXIT_CODE=$?
        set -e

        echo "exit_code=${EXIT_CODE}" >> "$GITHUB_OUTPUT"

        if [ "$EXIT_CODE" -eq 2 ]; then
          echo "::error::skills-check verify: configuration error"
          exit 2
        fi
        if [ "$EXIT_CODE" -eq 1 ]; then
          echo "::error::skills-check verify: version bump mismatches detected"
          exit 1
        fi

    # ── Test ───────────────────────────────────────────────────────────
    - name: Run skill test suites
      id: test
      if: steps.resolve.outputs.run_test == 'true'
      shell: bash
      run: |
        set +e
        npx --yes skills-check test "${{ inputs.skills-dir }}" --ci --format json
        EXIT_CODE=$?
        set -e

        echo "exit_code=${EXIT_CODE}" >> "$GITHUB_OUTPUT"

        if [ "$EXIT_CODE" -eq 2 ]; then
          echo "::error::skills-check test: configuration error"
          exit 2
        fi
        if [ "$EXIT_CODE" -eq 1 ]; then
          echo "::error::skills-check test: regressions detected"
          exit 1
        fi

    # ── Summary ────────────────────────────────────────────────────────
    - name: Collect results
      id: summary
      if: always()
      shell: bash
      run: |
        # Build a JSON object of exit codes for each command that ran
        RESULTS="{"
        FIRST=true

        for CMD in check audit lint budget policy verify test; do
          # Read exit code from the corresponding step output
          case "$CMD" in
            check)  CODE="${{ steps.check.outputs.exit_code }}"  ;;
            audit)  CODE="${{ steps.audit.outputs.exit_code }}"  ;;
            lint)   CODE="${{ steps.lint.outputs.exit_code }}"   ;;
            budget) CODE="${{ steps.budget.outputs.exit_code }}" ;;
            policy) CODE="${{ steps.policy.outputs.exit_code }}" ;;
            verify) CODE="${{ steps.verify.outputs.exit_code }}" ;;
            test)   CODE="${{ steps.test.outputs.exit_code }}"   ;;
          esac

          if [ -n "$CODE" ]; then
            if [ "$FIRST" = true ]; then
              FIRST=false
            else
              RESULTS="${RESULTS},"
            fi
            RESULTS="${RESULTS}\"${CMD}\":${CODE}"
          fi
        done

        RESULTS="${RESULTS}}"
        echo "results=${RESULTS}" >> "$GITHUB_OUTPUT"
